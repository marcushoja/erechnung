<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <style>
        @page { size: A4; margin: 18mm; }
        body { font-family: Helvetica, sans-serif; color: #0f2138; font-size: 10.5pt; }
        h1, h2, h3, p { margin: 0; }
        .header { width: 100%; border-collapse: collapse; margin-bottom: 16mm; }
        .header td { border: none; vertical-align: top; width: 50%; }
        .sender { line-height: 1.35; font-size: 10pt; margin-bottom: 18mm; }
        .recipient { line-height: 1.35; }
        .recipient .name { font-weight: 700; margin-bottom: 1mm; }
        .title { text-align: right; font-size: 24pt; font-weight: 700; margin-bottom: 4mm; }
        .meta-box { margin-left: auto; width: 88%; background: #edf1f6; padding: 5mm 5mm 4mm 5mm; }
        .meta-box table { width: 100%; border-collapse: collapse; }
        .meta-box td { border: none; padding: 1.5mm 0; }
        .meta-box td:first-child { font-weight: 700; width: 54%; }

        .line-table { width: 100%; border-collapse: collapse; margin-top: 5mm; }
        .line-table th { text-align: left; font-size: 10pt; padding: 3mm 2mm; border-bottom: 1px solid #cfd8e4; }
        .line-table td { padding: 3mm 2mm; border-bottom: 1px solid #dce3ec; vertical-align: top; }
        .line-table .qty, .line-table .price, .line-table .sum { text-align: right; white-space: nowrap; }

        .totals { margin-top: 7mm; width: 38%; margin-left: auto; }
        .totals table { width: 100%; border-collapse: collapse; }
        .totals td { border: none; padding: 1.4mm 0; }
        .totals td:first-child { text-align: left; }
        .totals td:last-child { text-align: right; white-space: nowrap; }
        .totals .gross td { font-size: 11.5pt; font-weight: 700; padding-top: 3mm; }

        .section { margin-top: 12mm; }
        .section h3 { font-size: 14pt; margin-bottom: 2mm; }
        .section p { line-height: 1.4; white-space: pre-line; }
    </style>
</head>
<body>
<table class="header">
    <tr>
        <td>
            <div class="sender">
                <p th:text="${invoice.seller.name}"></p>
                <p th:text="${invoice.seller.street}"></p>
                <p th:text="${invoice.seller.zip + ' ' + invoice.seller.city}"></p>
                <p th:text="${'Steuernummer: ' + invoice.seller.taxNumber}"></p>
                <p th:if="${invoice.seller.email != null and !invoice.seller.email.isBlank()}" th:text="${invoice.seller.email}"></p>
                <p th:if="${invoice.seller.phone != null and !invoice.seller.phone.isBlank()}" th:text="${invoice.seller.phone}"></p>
            </div>

            <div class="recipient">
                <p class="name" th:text="${invoice.buyer.name}"></p>
                <p th:text="${invoice.buyer.street}"></p>
                <p th:text="${invoice.buyer.zip + ' ' + invoice.buyer.city}"></p>
                <p th:if="${invoice.buyer.vatId != null and !invoice.buyer.vatId.isBlank()}" th:text="${'USt-IdNr.: ' + invoice.buyer.vatId}"></p>
            </div>
        </td>
        <td>
            <h1 class="title">Rechnung</h1>

            <div class="meta-box">
                <table>
                    <tr>
                        <td>Rechnungsnummer</td>
                        <td th:text="${invoice.meta.invoiceNumber}"></td>
                    </tr>
                    <tr>
                        <td>Datum</td>
                        <td th:text="${#temporals.format(invoice.meta.invoiceDate, 'dd.MM.yyyy')}"></td>
                    </tr>
                    <tr>
                        <td>Fälligkeitsdatum</td>
                        <td th:text="${#temporals.format(dueDate, 'dd.MM.yyyy')}"></td>
                    </tr>
                    <tr>
                        <td>Rechnungszeitraum</td>
                        <td>
                            <span th:if="${invoice.meta.servicePeriodStart != null and invoice.meta.servicePeriodEnd != null}"
                                  th:text="${#temporals.format(invoice.meta.servicePeriodStart, 'dd.MM.yyyy') + ' - ' + #temporals.format(invoice.meta.servicePeriodEnd, 'dd.MM.yyyy')}"></span>
                            <span th:if="${invoice.meta.servicePeriodStart == null or invoice.meta.servicePeriodEnd == null}"
                                  th:text="${#temporals.format(invoice.meta.serviceDate, 'dd.MM.yyyy')}"></span>
                        </td>
                    </tr>
                </table>
            </div>
        </td>
    </tr>
</table>

<table class="line-table">
    <thead>
    <tr>
        <th>Produkt oder Dienstleistung</th>
        <th class="qty">Menge</th>
        <th class="price">Einzelpreis</th>
        <th class="sum">Gesamtbetrag</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${invoice.items}">
        <td th:text="${item.description}"></td>
        <td class="qty" th:text="${#numbers.formatDecimal(item.quantity, 1, 2) + ' ' + item.unit.label()}"></td>
        <td class="price" th:text="${#numbers.formatDecimal(item.unitPriceNet, 1, 2) + ' EUR'}"></td>
        <td class="sum" th:text="${#numbers.formatDecimal(item.quantity * item.unitPriceNet, 1, 2) + ' EUR'}"></td>
    </tr>
    </tbody>
</table>

<div class="totals">
    <table>
        <tr>
            <td>Zwischensumme</td>
            <td th:text="${#numbers.formatDecimal(totals.netTotal, 1, 2) + ' EUR'}"></td>
        </tr>
        <tr th:if="${!invoice.smallBusinessRegulation}" th:each="tax : ${totals.taxSummaries}">
            <td th:text="${'USt ' + #numbers.formatDecimal(tax.taxRate, 1, 2) + '%'}"></td>
            <td th:text="${#numbers.formatDecimal(tax.taxAmount, 1, 2) + ' EUR'}"></td>
        </tr>
        <tr class="gross">
            <td th:text="${invoice.smallBusinessRegulation ? 'Gesamtbetrag' : 'Gesamtbetrag (Brutto)'}"></td>
            <td th:text="${#numbers.formatDecimal(totals.grossTotal, 1, 2) + ' EUR'}"></td>
        </tr>
    </table>
</div>

<div class="section">
    <h3>Zahlung</h3>
    <p th:text="${paymentTermsText}"></p>
    <p th:text="${'IBAN ' + invoice.seller.iban}"></p>
    <p th:if="${invoice.seller.bic != null and !invoice.seller.bic.isBlank()}" th:text="${'BIC ' + invoice.seller.bic}"></p>
</div>

<div class="section">
    <h3>Anmerkungen</h3>
    <p th:if="${invoice.paymentInstructionText != null and !invoice.paymentInstructionText.isBlank()}" th:text="${invoice.paymentInstructionText}"></p>
    <p th:if="${invoice.smallBusinessRegulation}">Gemäß § 19 UStG wird keine Umsatzsteuer berechnet.</p>
</div>
</body>
</html>
